        }

            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            color: white;
        }
        .logo {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.8);
        }
        h1 {
            margin: 0;
            font-size: 2.4rem;
            text-shadow: 1px 1px 6px rgba(0,0,0,0.6);
        }
        .panel {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            padding: 22px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: 700;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            margin: 8px 8px 0 0;
            background: #2f8f55;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease;
        }
        button:hover {
            transform: translateY(-1px);
            background: #257645;
        }
        .actions button {
            min-width: 140px;
        }
        #menuDetails {
            margin-top: 20px;
        }
        .day-section {
            background: #f5f5f5;
            border: 2px solid #2f8f55;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .day-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2f8f55;
            margin-bottom: 20px;
            border-bottom: 2px solid #2f8f55;
            padding-bottom: 10px;
        }
        .meal-section {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .meal-header {
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2f8f55;
        }
        .meal-toggle {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 10px;
            background: #f0f8f5;
            border-radius: 8px;
        }
        .meal-toggle label {
            display: flex;
            align-items: center;
            margin: 0;
            font-weight: 600;
            cursor: pointer;
            gap: 6px;
        }
        .meal-toggle input[type="radio"] {
            width: auto;
            margin: 0;
            padding: 0;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .category-card {
            background: #fafafa;
            border: 1px solid #ddd;
            border-left: 4px solid #2f8f55;
            border-radius: 8px;
            padding: 10px;
        }
        .category-name {
            font-weight: 600;
            color: #2f8f55;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .category-subtitle {
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 8px;
        }
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .item-check {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .item-check input[type="checkbox"] {
            width: auto;
            margin: 0;
            padding: 0;
            cursor: pointer;
        }
        .item-check label {
            margin: 0;
            font-weight: 400;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .selection-counter {
            font-size: 0.75rem;
            color: #fff;
            background: #2f8f55;
            padding: 6px 8px;
            border-radius: 4px;
            margin-top: 8px;
            text-align: center;
            font-weight: 600;
        }
        .error-msg {
            color: #c62828;
            font-weight: 600;
            padding: 6px;
            background: #ffebee;
            border-radius: 4px;
            margin-top: 6px;
            display: none;
            font-size: 0.8rem;
            text-align: center;
        }
        .summary-card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 14px;
            margin-top: 12px;
            background: #fafafa;
        }
        .order-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .summary-stat {
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #ddd;
        }
        table {

        }

            text-align: left;
            vertical-align: top;

                padding: 0;

            }

        function login() {
            const userType = document.getElementById('userType').value;
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            if (userId && password) {
                document.getElementById('loginPanel').style.display = 'none';
                if (userType === 'admin') {
                    document.getElementById('adminSection').style.display = 'block';
                    loadAllOrdersForSummary();
                } else {
                    document.getElementById('menuSection').style.display = 'block';
                    initPage();
                }
            } else {
                alert('Please enter ID and password');
            }
        }

        function initPage() {
            packageSelect = document.getElementById('packageSelect');
            eventStartDate = document.getElementById('eventStartDate');
            dayCount = document.getElementById('dayCount');

            packageSelect.addEventListener('change', renderMenuDetails);
            eventStartDate.addEventListener('change', renderMenuDetails);
            dayCount.addEventListener('change', renderMenuDetails);

            renderMenuDetails();
        }

            const pack = packageData[selectedKey];
            const selectedDayCount = parseInt(dayCount.value, 10) || 1;

            dates.forEach((date, dayIndex) => {
                html += `<div class="day-section">`;
                html += `<div class="day-title">Day ${dayIndex + 1} — ${date}</div>`;
                html += renderMealSection('Breakfast', pack.breakfast, dayIndex);
                html += renderMealSection('Lunch', pack.lunch, dayIndex);
                html += renderMealSection('Dinner', pack.dinner, dayIndex);
                html += `</div>`;
            });

            document.getElementById('menuDetails').innerHTML = html;
            updateMenuSummary();
        }

        function renderMealSection(mealName, mealCategories, dayIndex) {
            const mealLower = mealName.toLowerCase();
            const radioName = `${mealLower}-day${dayIndex}`;

            let html = `<div class="meal-section">
                <div class="meal-header">${mealName}</div>
                <div class="meal-toggle">
                    <label><input type="radio" name="${radioName}" value="select" checked> Select Items</label>
                    <label><input type="radio" name="${radioName}" value="na"> Not Applicable</label>
                </div>
                <div class="category-grid" id="categories-${radioName}">`;

            Object.entries(mealCategories).forEach(([catName, items]) => {
                const catId = `${mealLower}-${catName}-day${dayIndex}`;
                html += `<div class="category-card">
                    <div class="category-name">${catName}</div>
                    <div class="category-subtitle">Select up to 3</div>
                    <div class="item-list">`;
                
                items.forEach(item => {
                    html += `<div class="item-check">
                        <input type="checkbox" value="${item}" data-meal="${mealLower}" data-cat="${catName}" data-day="${dayIndex}" class="chk">
                        <label>${item}</label>
                    </div>`;
                });
                
                html += `</div>
                    <div class="selection-counter" id="counter-${catId}">Selected: 0/3</div>
                    <div class="error-msg" id="error-${catId}"></div>
                </div>`;
            });

            html += `</div></div>`;
            return html;
        }

        function buildEventDates(startDate, days) {
            const base = new Date(startDate);
            const dates = [];
            for (let i = 0; i < days; i++) {
                const day = new Date(base);
                day.setDate(base.getDate() + i);
                dates.push(day.toISOString().slice(0, 10));
            }
            return dates;
        }

        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('chk')) {
                const meal = e.target.dataset.meal;
                const cat = e.target.dataset.cat;
                const day = e.target.dataset.day;
                const catId = `${meal}-${cat}-day${day}`;

                const count = document.querySelectorAll(`input[data-meal="${meal}"][data-cat="${cat}"][data-day="${day}"]:checked`).length;
                const counter = document.getElementById(`counter-${catId}`);
                const errorDiv = document.getElementById(`error-${catId}`);

                if (count > 3) {
                    e.target.checked = false;
                    errorDiv.textContent = '❌ Maximum 3 items!';
                    errorDiv.style.display = 'block';
                    setTimeout(() => errorDiv.style.display = 'none', 2000);
                } else {
                    errorDiv.style.display = 'none';
                    counter.textContent = `Selected: ${count}/3`;
                }

                updateMenuSummary();
            }
        });

        function updateMenuSummary() {
            const selectedKey = packageSelect.value;
            const pack = packageData[selectedKey];
            const selectedDayCount = parseInt(dayCount.value, 10) || 1;
            const startDateValue = eventStartDate.value || new Date().toISOString().slice(0, 10);
            const dates = buildEventDates(startDateValue, selectedDayCount);

            const checkedItems = document.querySelectorAll('input[type="checkbox"]:checked');
            const byDay = {};

            dates.forEach((_, i) => {
                byDay[i] = { breakfast: [], lunch: [], dinner: [] };
            });

            checkedItems.forEach(cb => {
                const day = parseInt(cb.dataset.day);
                const meal = cb.dataset.meal;
                const value = cb.value;
                const cat = cb.dataset.cat;
                byDay[day][meal].push(`${value} (${cat})`);
            });

            let html = `<h3>Selection Summary</h3><p><strong>Package:</strong> ${pack.title} | <strong>Days:</strong> ${dates.length}</p>`;
            html += `<table><thead><tr><th>Meal</th>${dates.map(d => `<th>${d}</th>`).join('')}</tr></thead><tbody>`;

            ['Breakfast', 'Lunch', 'Dinner'].forEach(meal => {
                html += `<tr><th>${meal}</th>`;
                dates.forEach((_, i) => {
                    const items = byDay[i][meal.toLowerCase()] || [];
                    html += `<td>${items.length ? items.map(x => `✓ ${x}`).join('<br>') : '-'}</td>`;
                });
                html += `</tr>`;
            });

            html += `</tbody></table>`;
            document.getElementById('menuSummary').innerHTML = html;
        }

        function saveSelection() {
            const checkedItems = document.querySelectorAll('input[type="checkbox"]:checked');
            const items = Array.from(checkedItems).map(cb => `${cb.value} (${cb.dataset.cat})`);
            
            const order = {
                userType: 'user',
                userId: document.getElementById('userId').value,
                packageTitle: packageData[packageSelect.value].title,
                packagePrice: packageData[packageSelect.value].price,
                eventStartDate: eventStartDate.value,
                eventDates: buildEventDates(eventStartDate.value, parseInt(dayCount.value) || 1),
                selectedItems: items,
                timestamp: new Date().toISOString()
            };

            const saved = JSON.parse(localStorage.getItem('cateringSelections') || '[]');
            saved.push(order);
            localStorage.setItem('cateringSelections', JSON.stringify(saved));
            alert('✅ Order Saved!');
        }

        function generateBarcode() {
            const items = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value).slice(0, 5).join(',');
            const text = `${packageData[packageSelect.value].title}|${eventStartDate.value}|${items}`;
            document.getElementById('menuDetails').innerHTML += '<svg id="barcode" style="margin-top:20px;"></svg>';
            JsBarcode('#barcode', text, { format: 'CODE128', width: 2, height: 80, displayValue: true });
        }

        function printMenu() {
            window.print();
        }

        function loadAllOrdersForSummary() {
            const saved = JSON.parse(localStorage.getItem('cateringSelections') || '[]');
            updateOrderSummary(saved);
        }

        function loadData() {
            const month = document.getElementById('monthSelect').value;
            if (!month) {
                alert('Select a month!');
                return;
            }
            const saved = JSON.parse(localStorage.getItem('cateringSelections') || '[]');
            const filtered = saved.filter(item => item.eventDates && item.eventDates[0].startsWith(month));
            displayOrders(filtered, `Orders for ${month}`);
        }

        function loadDataByDate() {
            const date = document.getElementById('orderDateSelect').value;
            if (!date) {
                alert('Select a date!');
                return;
            }
            const saved = JSON.parse(localStorage.getItem('cateringSelections') || '[]');
            const filtered = saved.filter(item => item.eventDates && item.eventDates.includes(date));
            displayOrders(filtered, `Orders for ${date}`);
        }

        function displayOrders(orders, title) {
            updateOrderSummary(orders);
            let html = `<h3>${title}</h3>`;
            if (!orders.length) {
                html += '<p>No orders found.</p>';
            } else {
                orders.forEach((order, i) => {
                    html += `<div class="order-card">
                        <p><strong>Order #${i + 1}</strong></p>
                        <p><strong>User:</strong> ${order.userId}</p>
                        <p><strong>Package:</strong> ${order.packageTitle} (₹${order.packagePrice})</p>
                        <p><strong>Dates:</strong> ${order.eventDates.join(', ')}</p>
                        <p><strong>Items:</strong><br>${order.selectedItems.map(x => `• ${x}`).join('<br>')}</p>
                    </div>`;
                });
            }
            document.getElementById('dataDisplay').innerHTML = html;
        }

        function updateOrderSummary(orders) {
            if (!orders.length) {
                document.getElementById('orderSummary').innerHTML = '<div style="text-align:center;color:#999;padding:20px;">No orders</div>';
                return;
            }
            const total = orders.length;
            const revenue = orders.reduce((sum, o) => sum + parseInt(o.packagePrice), 0);
            document.getElementById('orderSummary').innerHTML = `
                <div class="summary-stat"><div style="font-size:2rem;">📦</div><div>${total}</div><div>Orders</div></div>
                <div class="summary-stat"><div style="font-size:2rem;">💰</div><div>₹${revenue}</div><div>Revenue</div></div>
            `;
        }

        function printOrders() {
            window.print();
        }
    </script>
</body>
</html>
